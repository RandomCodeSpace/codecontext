name: Test CLI (Python)

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main
      - claude/**

jobs:
  test-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout codecontext repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Verify CLI entrypoint
        run: |
          uv run python -m codecontext -version
          uv run python -m codecontext -help >/dev/null 2>&1

      - name: Run unit tests
        run: |
          uv run pytest -q tests/test_cli_smoke.py tests/test_indexer_basic.py tests/test_docs_command.py tests/test_mcp_tools.py tests/test_ai_commands.py tests/test_web_api.py

      - name: Build and install wheel
        run: |
          uv build
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          codecontext -version

      - name: Test CLI on repository
        run: |
          rm -f .codecontext.db
          uv run python -m codecontext index .
          uv run python -m codecontext stats
          uv run python -m codecontext query entity parse

      - name: Test mixed-language indexing
        run: |
          cd /tmp
          mkdir -p mixed-project/go-code mixed-project/python-code mixed-project/js-code mixed-project/java-code

          cat > mixed-project/go-code/main.go << 'EOF'
          package main
          import "fmt"
          func Add(a, b int) int { return a + b }
          func main() { fmt.Println(Add(1,2)) }
          EOF

          cat > mixed-project/python-code/main.py << 'EOF'
          class Calculator:
              def add(self, a, b):
                  return a + b
          EOF

          cat > mixed-project/js-code/main.js << 'EOF'
          function hello() { return 1; }
          module.exports = { hello };
          EOF

          cat > mixed-project/java-code/Main.java << 'EOF'
          public class Main {
              public static int add(int a, int b) { return a + b; }
          }
          EOF

          cd mixed-project
          uv run python -m codecontext index .
          uv run python -m codecontext stats
          uv run python -m codecontext query entity add
