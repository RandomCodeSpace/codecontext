name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3, v1.2.3-alpha.1, v1.2.3-beta.2, v1.2.3-snapshot)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Check version format
        run: |
          # Accepts: v1.2.3 | v1.2.3-alpha | v1.2.3-alpha.1 | v1.2.3-beta.2 | v1.2.3-snapshot
          SEMVER_RE='^v[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|snapshot)(\.[0-9]+)?))?$'
          if [[ ! "${{ inputs.version }}" =~ $SEMVER_RE ]]; then
            echo "Error: version must be vMAJOR.MINOR.PATCH with an optional pre-release label."
            echo "Valid examples: v1.2.3  v1.2.3-alpha  v1.2.3-alpha.1  v1.2.3-beta.2  v1.2.3-snapshot"
            exit 1
          fi

  publish:
    name: Tag, build, and publish release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run test suite
        run: uv run pytest -q

      - name: Set package version from release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PKG_VERSION="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"${PKG_VERSION}\"/" pyproject.toml
          echo "Using package version ${PKG_VERSION}"

      - name: Build python distributions
        run: uv build

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

          # Wait for tag to be available (GitHub eventually-consistent)
          sleep 2

          PRERELEASE_FLAG=""
          [[ "$VERSION" == *-* ]] && PRERELEASE_FLAG="--prerelease"

          echo "Creating release for $VERSION (prerelease: $PRERELEASE_FLAG)"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG || \
            { echo "Release creation failed"; exit 1; }

      - name: Upload distribution artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release upload "$VERSION" dist/* --clobber
