name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.3, v1.2.3-alpha.1, v1.2.3-beta.2, v1.2.3-snapshot)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Check version format
        run: |
          # Accepts: v1.2.3 | v1.2.3-alpha | v1.2.3-alpha.1 | v1.2.3-beta.2 | v1.2.3-snapshot
          SEMVER_RE='^v[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|snapshot)(\.[0-9]+)?))?$'
          if [[ ! "${{ inputs.version }}" =~ $SEMVER_RE ]]; then
            echo "Error: version must be vMAJOR.MINOR.PATCH with an optional pre-release label."
            echo "Valid examples: v1.2.3  v1.2.3-alpha  v1.2.3-alpha.1  v1.2.3-beta.2  v1.2.3-snapshot"
            exit 1
          fi

  publish:
    name: Tag and publish release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(inputs.version, '-') }}
